# Alembic 数据库迁移配置文件
# A generic, single database configuration.

[alembic]
# 迁移脚本存放目录
script_location = migrations

# 数据库连接 URL（通过环境变量设置）
sqlalchemy.url = postgresql://textlens:textlens123@localhost:5432/textlens

# 日志配置
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
