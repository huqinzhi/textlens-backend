version: '3.9'

services:
  api:
    build: .
    container_name: textlens-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery_worker:
    build: .
    container_name: textlens-celery
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4

  celery_beat:
    build: .
    container_name: textlens-beat
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    command: celery -A app.tasks.celery_app beat --loglevel=info

  postgres:
    image: postgres:15-alpine
    container_name: textlens-postgres
    environment:
      POSTGRES_USER: textlens_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-textlens_password}
      POSTGRES_DB: textlens
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U textlens_user -d textlens"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: textlens-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  flower:
    build: .
    container_name: textlens-flower
    env_file:
      - .env
    ports:
      - "5555:5555"
    depends_on:
      - redis
    command: celery -A app.tasks.celery_app flower --port=5555

volumes:
  postgres_data:
  redis_data:
