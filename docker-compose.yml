version: '3.9'

services:
  api:
    build: .
    container_name: textlens-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build: .
    container_name: textlens-celery
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4

  celery_beat:
    build: .
    container_name: textlens-beat
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    command: celery -A app.tasks.celery_app beat --loglevel=info

  postgres:
    image: postgres:15-alpine
    container_name: textlens-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-textlens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-textlens123}
      POSTGRES_DB: ${POSTGRES_DB:-textlens}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: textlens-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  flower:
    build: .
    container_name: textlens-flower
    env_file:
      - .env
    ports:
      - "5555:5555"
    depends_on:
      - redis
    command: celery -A app.tasks.celery_app flower --port=5555

volumes:
  postgres_data:
  redis_data:
